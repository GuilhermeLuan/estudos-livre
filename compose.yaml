name: estuda-livre

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-estuda_livre}
      POSTGRES_USER: ${POSTGRES_USER:-estuda_livre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-estuda_livre}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  app:
    build:
      context: .
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-estuda_livre}
      DATABASE_USERNAME: ${POSTGRES_USER:-estuda_livre}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-estuda_livre}
      SESSION_TIMEOUT: ${SESSION_TIMEOUT:-30m}
      SERVER_FORWARD_HEADERS_STRATEGY: ${SERVER_FORWARD_HEADERS_STRATEGY:-none}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres-data:
